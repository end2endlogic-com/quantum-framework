# Publishes quantum-docs: LTS (1.3.x) to gh-pages root; 1.4.0-SNAPSHOT preview under /1.4.0-SNAPSHOT/.
name: Publish quantum-docs to GitHub Pages

on:
  push:
    branches:
      - '1.3.x'
      - '1.4.0-SNAPSHOT'
  workflow_dispatch:
    inputs:
      docs_profile:
        description: 'LTS → site root; 1.4 → /1.4.0-SNAPSHOT/ only'
        required: true
        default: 'docs-ghpages-1.3.x'
        type: choice
        options:
          - docs-ghpages-1.3.x
          - docs-ghpages-lts
          - docs-ghpages-1.4

permissions:
  contents: write

concurrency:
  group: publish-quantum-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Configure Maven SCM credentials for GitHub
        env:
          MAVEN_SCM_USER: ${{ github.actor }}
          MAVEN_SCM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${MAVEN_SCM_USER}</username>
                <password>${MAVEN_SCM_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Resolve docs Maven profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ inputs.docs_profile }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "1.3.x" ]; then
            echo "profile=docs-ghpages-1.3.x" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "1.4.0-SNAPSHOT" ]; then
            echo "profile=docs-ghpages-1.4" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported ref: ${{ github.ref_name }}" >&2
            exit 1
          fi

      - name: Build and publish docs to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          mvn -B -pl quantum-docs -am \
            -P"${{ steps.profile.outputs.profile }}" \
            -DskipTests \
            -Dgpg.skip=true \
            -Dmaven.javadoc.skip=true \
            package deploy
