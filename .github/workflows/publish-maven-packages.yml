name: Publish Maven Packages

on:
  push:
    branches:
      - movista-dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish to GitHub Packages
        # Tests skipped: quantum-framework integration tests require MongoDB /
        # other services that aren't provisioned in this runner.
        # quantum-docs excluded from the reactor: it pushes rendered HTML to a
        # gh-pages branch that doesn't exist on the MoVista fork, and it
        # doesn't produce a JAR consumers depend on anyway. Run `mvn install`
        # locally if you want docs rendered.
        run: >
          mvn --batch-mode -Pgithub-packages
          -DskipTests
          -pl '!quantum-docs'
          deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
