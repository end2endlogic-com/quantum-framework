name: Publish Maven Packages

on:
  push:
    branches:
      - movista-dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish to GitHub Packages
        # Tests are skipped in the publish workflow because quantum-framework
        # integration tests require MongoDB (and other services) that aren't
        # provisioned in this runner. Run tests locally or in a dedicated CI
        # workflow with service containers configured.
        run: mvn --batch-mode -Pgithub-packages -DskipTests deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
