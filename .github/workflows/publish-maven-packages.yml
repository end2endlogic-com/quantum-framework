name: Publish Maven Packages

on:
  push:
    branches:
      - movista-dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish to GitHub Packages
        # Tests are skipped in the publish workflow because quantum-framework
        # integration tests require MongoDB (and other services) that aren't
        # provisioned in this runner. Run tests locally or in a dedicated CI
        # workflow with service containers configured.
        #
        # scmpublish.skipDeployment=true disables the maven-scm-publish-plugin
        # in quantum-docs that would try to push rendered HTML to a gh-pages
        # branch (which doesn't exist on the MoVista fork). Docs still build
        # and their (empty, skip=true) jar still installs, but nothing is
        # pushed to GitHub Pages. If you want docs published, create a gh-pages
        # branch on the fork and remove this flag.
        run: >
          mvn --batch-mode -Pgithub-packages
          -DskipTests
          -Dscmpublish.skipDeployment=true
          deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
